name: Mobile Android APK

on:
  push:
    branches: [native-plan]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install deps
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild Android (generates android/ from app.json)
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/kynfowk-release.keystore

      - name: Build APK with gradle
        working-directory: mobile/android
        timeout-minutes: 25
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=/tmp/kynfowk-release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: kynfowk-mobile-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
