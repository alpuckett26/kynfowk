name: Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Create .env for Metro bundler
        working-directory: apps/native
        run: |
          echo "EXPO_PUBLIC_APP_ENV=preview" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_LIVEKIT_URL=${{ secrets.EXPO_PUBLIC_LIVEKIT_URL }}" >> .env
          echo "EXPO_PUBLIC_APP_URL=${{ secrets.EXPO_PUBLIC_APP_URL }}" >> .env
          echo "EXPO_PUBLIC_PROJECT_ID=${{ secrets.EXPO_PUBLIC_PROJECT_ID }}" >> .env

      - name: Prebuild Android
        working-directory: apps/native
        run: npx expo prebuild --platform android --clean --no-install

      - name: Disable R8 / proguard for release — isolate minification as crash cause
        working-directory: apps/native/android/app
        run: |
          # Release APK currently loads JS and renders initial screen fine,
          # but any React re-render crashes white. Most likely cause in release
          # vs debug: R8 (proguard replacement) mangling some class that
          # RN's bridge or a native module depends on.
          #
          # Force release buildType to minifyEnabled false and shrinkResources false
          # so release builds like debug internally but still has JS bundled.
          # We keep Hermes-vs-JSC setting from app.json (currently JSC).
          sed -i 's|minifyEnabled true|minifyEnabled false|g' build.gradle
          sed -i 's|shrinkResources true|shrinkResources false|g' build.gradle
          echo "--- build.gradle release block ---"
          grep -A 10 "release {" build.gradle || true

      - name: Bundle JS for debug APK (expo export:embed)
        working-directory: apps/native
        run: |
          # RN 0.73 dropped bundleInDebug. Bundle JS manually and drop it
          # into the exact location gradle packages from.
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res || echo "[warn] export:embed failed — debug APK may show 'Unable to load script'"
          ls -la android/app/src/main/assets/ || true

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/kynfowk-release.keystore

      - name: Build APKs (release + debug)
        working-directory: apps/native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease assembleDebug \
            -PMYAPP_UPLOAD_STORE_FILE=/tmp/kynfowk-release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/native/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
