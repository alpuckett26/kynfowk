name: Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Create .env for Metro bundler
        working-directory: apps/native
        run: |
          echo "EXPO_PUBLIC_APP_ENV=preview" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_LIVEKIT_URL=${{ secrets.EXPO_PUBLIC_LIVEKIT_URL }}" >> .env
          echo "EXPO_PUBLIC_APP_URL=${{ secrets.EXPO_PUBLIC_APP_URL }}" >> .env
          echo "EXPO_PUBLIC_PROJECT_ID=${{ secrets.EXPO_PUBLIC_PROJECT_ID }}" >> .env

      - name: Prebuild Android
        working-directory: apps/native
        run: npx expo prebuild --platform android --clean --no-install

      - name: Force bundleInDebug so debug APK is self-contained
        working-directory: apps/native/android/app
        run: |
          # RN 0.73 build.gradle has a `react { ... }` block with commented-out
          # bundleInDebug. Uncomment and set true so assembleDebug bundles JS
          # into the APK — otherwise debug APK tries to load from Metro and
          # shows "Unable to load script" on standalone install.
          if grep -q "bundleInDebug" build.gradle; then
            sed -i 's|// *bundleInDebug *=.*|bundleInDebug = true|' build.gradle
            sed -i 's|// *bundleInDebug *:.*|bundleInDebug: true,|' build.gradle
          fi
          # Fallback: inject inside the react { } block if no commented flag exists
          if ! grep -q "bundleInDebug" build.gradle; then
            sed -i '/^react {/a\    bundleInDebug = true' build.gradle
          fi
          echo "--- build.gradle react block ---"
          grep -A 20 "^react {" build.gradle || true

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/kynfowk-release.keystore

      - name: Build APKs (release + debug)
        working-directory: apps/native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease assembleDebug \
            -PMYAPP_UPLOAD_STORE_FILE=/tmp/kynfowk-release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/native/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
