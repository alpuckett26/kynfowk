name: Mobile iOS — EAS Build

# Triggers an EAS Build (cloud) for iOS. Runs on manual dispatch from
# the GitHub Actions tab — phone-friendly via the GitHub mobile app.
#
# Why a cloud delegate vs. building locally like Android:
#   - iOS builds need macOS + Xcode + Apple developer signing assets.
#   - GitHub-hosted macOS runners cost minutes; EAS Build is included
#     in the Expo plan we're already paying for.
#   - EAS handles cert + provisioning profile rotation automatically
#     when given an App Store Connect API key.
#
# Required GitHub repo secrets:
#   EXPO_TOKEN                       Robot/personal token from
#                                    expo.dev → Account Settings →
#                                    Access Tokens.
#   EXPO_PUBLIC_SUPABASE_URL         Same as the Android workflow.
#   EXPO_PUBLIC_SUPABASE_ANON_KEY    Same.
#   WEB_API_BASE_URL                 = https://kynfowk.com
#
#   ASC_API_KEY_P8_BASE64            base64 of the .p8 key file
#                                    downloaded from App Store Connect.
#   ASC_API_KEY_ID                   The 10-char key ID shown next to
#                                    the key name in ASC.
#   ASC_API_ISSUER_ID                The UUID at the top of the
#                                    App Store Connect API Keys page.
#
# With the ASC API key in place, the first build auto-creates a
# Distribution Certificate + Provisioning Profile via Apple's API
# (no interactive prompts). Subsequent builds reuse them.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      submit:
        description: 'Auto-submit to App Store Connect after build'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Type check (catches obvious errors before kicking off cloud build)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Decode App Store Connect API key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_P8_BASE64" ]; then
            echo "ASC_API_KEY_P8_BASE64 secret is missing — see mobile/IOS_BUILD_FROM_PHONE.md"
            exit 1
          fi
          mkdir -p /tmp/asc
          echo "$ASC_API_KEY_P8_BASE64" | base64 -d > /tmp/asc/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Trigger EAS build
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_WEB_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL }}
          # EAS reads these to auto-manage Apple credentials. No
          # interactive prompts; first build generates a Distribution
          # Cert + Provisioning Profile in App Store Connect via the
          # API key, then reuses them.
          APPLE_API_KEY_PATH: /tmp/asc/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          npx eas-cli build \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Submit to App Store Connect (if opted in)
        if: ${{ inputs.submit == true }}
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_API_KEY_PATH: /tmp/asc/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          # --wait blocks until the build above completes, then submits.
          npx eas-cli submit \
            --platform ios \
            --latest \
            --non-interactive \
            --wait
