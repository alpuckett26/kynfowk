name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm install --legacy-peer-deps
        timeout-minutes: 5

      - name: Build packages
        run: npm run build:packages
        timeout-minutes: 3

      - name: List packages dist output
        run: |
          for p in packages/*/; do
            echo "=== $p dist ==="
            ls -la "${p}dist/" || echo "(no dist/)"
          done

      - name: Build web
        run: npm run build:web
        timeout-minutes: 5
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Lint
        run: CI=true npm run lint
        timeout-minutes: 3
        continue-on-error: true

      - name: Test
        run: CI=true npm run test -- --watchAll=false
        timeout-minutes: 3
        continue-on-error: true
