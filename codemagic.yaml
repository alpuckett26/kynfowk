workflows:

  # ─────────────────────────────────────────────
  # iOS — App Store
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kynfowk.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.kynfowk.app
        APP_STORE_APPLE_ID: "6761375113"
      node: 20.18.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set version from tag
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          xcrun agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for full release
      email:
        recipients:
          - alpuckett26@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android — Google Play
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - kynfowk_keystore          # keystore name set up in Codemagic
      vars:
        PACKAGE_NAME: com.kynfowk.app
      node: 20.18.0
      java: 21

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Capacitor sync
        script: npx cap sync android

      - name: Set version from tag
        script: |
          # Strip leading "v" from tag, e.g. v1.2.3 → 1.2.3
          VERSION="${CM_TAG#v}"
          BUILD_NUMBER=$(($CM_BUILD_NUMBER))
          # Patch versionName and versionCode in build.gradle
          sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Build Android release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal          # promote to alpha/beta/production in Play Console
        submit_as_draft: false
      email:
        recipients:
          - alpuckett26@gmail.com
        notify:
          success: true
          failure: true
